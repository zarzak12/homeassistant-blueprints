blueprint:
  name: "Protection chaleur - Volets sud/ouest (avec et sans retour)"
  description: >
    Gestion automatique des volets et BSO selon la température,
    la position du soleil et la saison.
    Compatible volets avec retour de position et sans retour (minuterie).
    Fonctionne en continu, sans mode absence.

  domain: automation

  input:

    # ───── Capteurs ─────
    capteur_temp_ext:
      name: Température extérieure
      selector:
        entity:
          domain: sensor
          device_class: temperature

    capteur_temp_int:
      name: Température intérieure
      selector:
        entity:
          domain: sensor
          device_class: temperature

    # ───── BSO (avec retour) ─────
    bso_avec_retour:
      name: "BSO / Volets avec retour de position"
      description: "Vos BSO Somfy IO (retour d'info disponible)"
      selector:
        target:
          entity:
            domain: cover

    # ───── Volets sans retour ─────
    volet_baie_sud:
      default: ""
      selector:
        entity:
          domain: cover

    duree_baie_sud:
      default: 30
      selector:
        number:
          min: 5
          max: 120
          unit_of_measurement: s

    volet_panoramique_sud:
      default: ""
      selector:
        entity:
          domain: cover

    duree_panoramique_sud:
      default: 30
      selector:
        number:
          min: 5
          max: 120

    volet_baie_ouest:
      default: ""
      selector:
        entity:
          domain: cover

    duree_baie_ouest:
      default: 30
      selector:
        number:
          min: 5
          max: 120

    volet_panoramique_ouest:
      default: ""
      selector:
        entity:
          domain: cover

    duree_panoramique_ouest:
      default: 30
      selector:
        number:
          min: 5
          max: 120

    # ───── Soleil ─────
    azimut_min:
      default: 90
      selector:
        number: { min: 0, max: 180 }

    azimut_max:
      default: 270
      selector:
        number: { min: 180, max: 360 }

    elevation_min:
      default: 10
      selector:
        number: { min: 0, max: 90 }

    # ───── Période chaude ─────
    periode_chaude_debut:
      selector:
        date: {}

    periode_chaude_fin:
      selector:
        date: {}

    # ───── Seuils CHAUD ─────
    chaud_ext_p1: { default: 25, selector: { number: { min: 0, max: 50 }}}
    chaud_ext_p2: { default: 29, selector: { number: { min: 0, max: 50 }}}
    chaud_ext_p3: { default: 33, selector: { number: { min: 0, max: 50 }}}

    chaud_int_p1: { default: 24, selector: { number: { min: 0, max: 50 }}}
    chaud_int_p2: { default: 27, selector: { number: { min: 0, max: 50 }}}
    chaud_int_p3: { default: 30, selector: { number: { min: 0, max: 50 }}}

    # ───── Seuils FROID ─────
    froid_ext_p1: { default: 15, selector: { number: { min: 0, max: 50 }}}
    froid_ext_p2: { default: 20, selector: { number: { min: 0, max: 50 }}}
    froid_ext_p3: { default: 25, selector: { number: { min: 0, max: 50 }}}

    froid_int_p1: { default: 20, selector: { number: { min: 0, max: 50 }}}
    froid_int_p2: { default: 23, selector: { number: { min: 0, max: 50 }}}
    froid_int_p3: { default: 26, selector: { number: { min: 0, max: 50 }}}

    # ───── Mémoire ─────
    dernier_palier:
      name: Dernier palier appliqué
      selector:
        entity:
          domain: input_number

trigger:
  - platform: time_pattern
    minutes: "/10"

mode: restart

action:

  - variables:
      capteur_temp_ext: !input capteur_temp_ext
      capteur_temp_int: !input capteur_temp_int
      azimut_min: !input azimut_min
      azimut_max: !input azimut_max
      elevation_min: !input elevation_min
      periode_chaude_debut: !input periode_chaude_debut
      periode_chaude_fin: !input periode_chaude_fin
      
      temp_ext: "{{ states(capteur_temp_ext) | float(0) }}"
      temp_int: "{{ states(capteur_temp_int) | float(0) }}"

      azimut: "{{ state_attr('sun.sun', 'azimuth') | float(0) }}"
      elevation: "{{ state_attr('sun.sun', 'elevation') | float(0) }}"
      soleil_ok: >
        {{ azimut > azimut_min
           and azimut < azimut_max
           and elevation > elevation_min }}

      periode_chaude: >
        {% set d = strptime(periode_chaude_debut, '%Y-%m-%d') %}
        {% set f = strptime(periode_chaude_fin, '%Y-%m-%d') %}
        {% set n = now().timestamp() %}
        {% if d.timestamp() <= f.timestamp() %}
          {{ d.timestamp() <= n <= f.timestamp() }}
        {% else %}
          {{ n >= d.timestamp() or n <= f.timestamp() }}
        {% endif %}

      chaud_ext_p1: !input chaud_ext_p1
      chaud_ext_p2: !input chaud_ext_p2
      chaud_ext_p3: !input chaud_ext_p3
      froid_ext_p1: !input froid_ext_p1
      froid_ext_p2: !input froid_ext_p2
      froid_ext_p3: !input froid_ext_p3
      dernier_palier: !input dernier_palier
      
      s1e: "{{ chaud_ext_p1 if periode_chaude else froid_ext_p1 }}"
      s2e: "{{ chaud_ext_p2 if periode_chaude else froid_ext_p2 }}"
      s3e: "{{ chaud_ext_p3 if periode_chaude else froid_ext_p3 }}"
      s1i: "{{ chaud_int_p1 if periode_chaude else froid_int_p1 }}"
      s2i: "{{ chaud_int_p2 if periode_chaude else froid_int_p2 }}"
      s3i: "{{ chaud_int_p3 if periode_chaude else froid_int_p3 }}"

      palier: >
        {% if temp_ext >= s3e or temp_int >= s3i %} 3
        {% elif temp_ext >= s2e or temp_int >= s2i %} 2
        {% elif temp_ext >= s1e or temp_int >= s1i %} 1
        {% else %} 0
        {% endif %}

      ratio: "{{ {3: 0.9, 2: 0.5, 1: 0.25, 0: 0}[palier] }}"

      dernier: "{{ states(dernier_palier) | int(0) }}"

  - choose:

      # ───── FERMETURE ─────
      - conditions:
          - "{{ soleil_ok }}"
          - "{{ palier > 0 }}"
          - "{{ palier != dernier }}"
        sequence:

          - service: cover.set_cover_position
            target:
              entity_id: !input bso_avec_retour
            data:
              position: >
                {{ 10 if palier == 3 else 50 if palier == 2 else 75 }}

          - parallel:

              - if: "{{ !input volet_baie_sud != '' }}"
                then:
                  - service: cover.open_cover
                    target: { entity_id: !input volet_baie_sud }
                  - delay: { seconds: !input duree_baie_sud }
                  - service: cover.close_cover
                    target: { entity_id: !input volet_baie_sud }
                  - delay:
                      seconds: "{{ ( !input duree_baie_sud * ratio ) | int }}"
                  - service: cover.stop_cover
                    target: { entity_id: !input volet_baie_sud }

              - if: "{{ !input volet_panoramique_sud != '' }}"
                then:
                  - service: cover.open_cover
                    target: { entity_id: !input volet_panoramique_sud }
                  - delay: { seconds: !input duree_panoramique_sud }
                  - service: cover.close_cover
                    target: { entity_id: !input volet_panoramique_sud }
                  - delay:
                      seconds: "{{ ( !input duree_panoramique_sud * ratio ) | int }}"
                  - service: cover.stop_cover
                    target: { entity_id: !input volet_panoramique_sud }

          - service: input_number.set_value
            target:
              entity_id: !input dernier_palier
            data:
              value: "{{ palier }}"

      # ───── OUVERTURE SOIR ─────
      - conditions:
          - "{{ elevation < 3 }}"
          - "{{ dernier != 0 }}"
        sequence:
          - service: cover.open_cover
            target: !input bso_avec_retour

          - service: input_number.set_value
            target:
              entity_id: !input dernier_palier
            data:
              value: 0
