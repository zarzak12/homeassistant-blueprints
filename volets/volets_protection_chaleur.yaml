blueprint:
  name: "Protection chaleur - Volets (période chaude / froide)"
  description: >
    Ferme progressivement les volets selon la température extérieure et
    intérieure, la position du soleil et la période de l'année (chaude ou froide).
    Gère séparément les BSO avec retour de position et les volets sans retour
    pilotés par minuterie (montée complète + descente chronométrée).
  domain: automation
  author: "Home Assistant Blueprint"

  input:

    # ── Capteurs ──────────────────────────────────────────────
    capteur_temp_ext:
      name: "Capteur température extérieure"
      description: "Capteur côté nord"
      selector:
        entity:
          domain: sensor
          device_class: temperature

    capteur_temp_int:
      name: "Capteur température intérieure"
      selector:
        entity:
          domain: sensor
          device_class: temperature

    # ── BSO avec retour de position ───────────────────────────
    bso_avec_retour:
      name: "BSO / Volets avec retour de position"
      description: "Vos BSO Somfy IO — position envoyée directement"
      selector:
        target:
          entity:
            domain: cover

    # ── Volets sans retour ────────────────────────────────────
    volet_1:
      name: "Volet sans retour n°1"
      selector:
        entity:
          domain: cover
      default: ""

    duree_volet_1:
      name: "Durée descente complète - volet 1 (secondes)"
      selector:
        number:
          min: 5
          max: 120
          step: 1
          unit_of_measurement: s
      default: 30

    volet_2:
      name: "Volet sans retour n°2"
      selector:
        entity:
          domain: cover
      default: ""

    duree_volet_2:
      name: "Durée descente complète - volet 2 (secondes)"
      selector:
        number:
          min: 5
          max: 120
          step: 1
          unit_of_measurement: s
      default: 30

    volet_3:
      name: "Volet sans retour n°3"
      selector:
        entity:
          domain: cover
      default: ""

    duree_volet_3:
      name: "Durée descente complète - volet 3 (secondes)"
      selector:
        number:
          min: 5
          max: 120
          step: 1
          unit_of_measurement: s
      default: 30

    volet_4:
      name: "Volet sans retour n°4"
      selector:
        entity:
          domain: cover
      default: ""

    duree_volet_4:
      name: "Durée descente complète - volet 4 (secondes)"
      selector:
        number:
          min: 5
          max: 120
          step: 1
          unit_of_measurement: s
      default: 30

    # ── Soleil ────────────────────────────────────────────────
    azimut_min:
      name: "Azimut minimum d'activation (°)"
      description: "Le soleil doit dépasser cet angle (côté est). Défaut : 90°"
      selector:
        number:
          min: 0
          max: 180
          step: 5
          unit_of_measurement: "°"
      default: 90

    azimut_max:
      name: "Azimut maximum d'activation (°)"
      description: "Le soleil ne doit pas dépasser cet angle (côté ouest). Défaut : 270°"
      selector:
        number:
          min: 180
          max: 360
          step: 5
          unit_of_measurement: "°"
      default: 270

    # ── Période active ────────────────────────────────────────
    periode_active:
      name: "Période active"
      selector:
        select:
          options:
            - label: "🌞 Période chaude"
              value: "chaude"
            - label: "🌨️ Période froide"
              value: "froide"
      default: "chaude"

    # ── Seuils période CHAUDE ─────────────────────────────────
    chaude_ext_p1:
      name: "🌞 Chaude - Palier 1 temp ext (°C) — fermeture 25%"
      selector:
        number:
          min: 10
          max: 45
          step: 0.5
          unit_of_measurement: "°C"
      default: 25

    chaude_ext_p2:
      name: "🌞 Chaude - Palier 2 temp ext (°C) — fermeture 50%"
      selector:
        number:
          min: 10
          max: 45
          step: 0.5
          unit_of_measurement: "°C"
      default: 29

    chaude_ext_p3:
      name: "🌞 Chaude - Palier 3 temp ext (°C) — fermeture 90%"
      selector:
        number:
          min: 10
          max: 45
          step: 0.5
          unit_of_measurement: "°C"
      default: 33

    chaude_int_p1:
      name: "🌞 Chaude - Palier 1 temp int (°C) — fermeture 25%"
      selector:
        number:
          min: 15
          max: 45
          step: 0.5
          unit_of_measurement: "°C"
      default: 24

    chaude_int_p2:
      name: "🌞 Chaude - Palier 2 temp int (°C) — fermeture 50%"
      selector:
        number:
          min: 15
          max: 45
          step: 0.5
          unit_of_measurement: "°C"
      default: 27

    chaude_int_p3:
      name: "🌞 Chaude - Palier 3 temp int (°C) — fermeture 90%"
      selector:
        number:
          min: 15
          max: 45
          step: 0.5
          unit_of_measurement: "°C"
      default: 30

    # ── Seuils période FROIDE ─────────────────────────────────
    froide_ext_p1:
      name: "🌨️ Froide - Palier 1 temp ext (°C) — fermeture 25%"
      selector:
        number:
          min: 5
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
      default: 14

    froide_ext_p2:
      name: "🌨️ Froide - Palier 2 temp ext (°C) — fermeture 50%"
      selector:
        number:
          min: 5
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
      default: 18

    froide_ext_p3:
      name: "🌨️ Froide - Palier 3 temp ext (°C) — fermeture 90%"
      selector:
        number:
          min: 5
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
      default: 22

    froide_int_p1:
      name: "🌨️ Froide - Palier 1 temp int (°C) — fermeture 25%"
      selector:
        number:
          min: 15
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
      default: 19

    froide_int_p2:
      name: "🌨️ Froide - Palier 2 temp int (°C) — fermeture 50%"
      selector:
        number:
          min: 15
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
      default: 22

    froide_int_p3:
      name: "🌨️ Froide - Palier 3 temp int (°C) — fermeture 90%"
      selector:
        number:
          min: 15
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
      default: 25

# ── Déclencheurs ──────────────────────────────────────────────
trigger:
  - platform: time_pattern
    minutes: "/5"
  - platform: state
    entity_id:
      - !input capteur_temp_ext
      - !input capteur_temp_int
      - sun.sun

# ── Pas de condition au niveau racine ─────────────────────────
condition: []

# ── Action principale ─────────────────────────────────────────
action:
  - variables:
      capteur_temp_ext: !input capteur_temp_ext
      capteur_temp_int: !input capteur_temp_int
      periode: !input periode_active
      az_min: !input azimut_min
      az_max: !input azimut_max
      temp_ext: "{{ states(capteur_temp_ext) | float(0) }}"
      temp_int: "{{ states(capteur_temp_int) | float(0) }}"
      chaude_ext_p1: !input chaude_ext_p1
      chaude_ext_p2: !input chaude_ext_p2
      chaude_ext_p3: !input chaude_ext_p3
      chaude_int_p1: !input chaude_int_p1
      chaude_int_p2: !input chaude_int_p2
      chaude_int_p3: !input chaude_int_p3
      froide_ext_p1: !input froide_ext_p1
      froide_ext_p2: !input froide_ext_p2
      froide_ext_p3: !input froide_ext_p3
      froide_int_p1: !input froide_int_p1
      froide_int_p2: !input froide_int_p2
      froide_int_p3: !input froide_int_p3
      volet_1: !input volet_1
      duree_volet_1: !input duree_volet_1
      volet_2: !input volet_2
      duree_volet_2: !input duree_volet_2
      volet_3: !input volet_3
      duree_volet_3: !input duree_volet_3
      volet_4: !input volet_4
      duree_volet_4: !input duree_volet_4

      s1e: "{{ chaude_ext_p1 if periode == 'chaude' else froide_ext_p1 }}"
      s2e: "{{ chaude_ext_p2 if periode == 'chaude' else froide_ext_p2 }}"
      s3e: "{{ chaude_ext_p3 if periode == 'chaude' else froide_ext_p3 }}"
      s1i: "{{ chaude_int_p1 if periode == 'chaude' else froide_int_p1 }}"
      s2i: "{{ chaude_int_p2 if periode == 'chaude' else froide_int_p2 }}"
      s3i: "{{ chaude_int_p3 if periode == 'chaude' else froide_int_p3 }}"

      palier: >
        {% if temp_ext >= s3e | float or temp_int >= s3i | float %} 3
        {% elif temp_ext >= s2e | float or temp_int >= s2i | float %} 2
        {% elif temp_ext >= s1e | float or temp_int >= s1i | float %} 1
        {% else %} 0
        {% endif %}

      pos_bso: >
        {% if palier == '3' %} 10
        {% elif palier == '2' %} 50
        {% elif palier == '1' %} 75
        {% else %} -1
        {% endif %}

      ratio: >
        {% if palier == '3' %} 0.90
        {% elif palier == '2' %} 0.50
        {% elif palier == '1' %} 0.25
        {% else %} 0
        {% endif %}

  # ── Condition azimut vérifiée dans l'action ────────────────
  - condition: template
    value_template: >
      {% set azimut = state_attr('sun.sun', 'azimuth') | float(0) %}
      {{ azimut > az_min | float(90) and azimut < az_max | float(270) }}

  - choose:
      - conditions: "{{ palier in ['1','2','3'] }}"
        sequence:

          # BSO avec retour → position directe
          - service: cover.set_cover_position
            target: !input bso_avec_retour
            data:
              position: "{{ pos_bso }}"

          # Volets sans retour → minuterie en parallèle
          - parallel:

            - if:
                - condition: template
                  value_template: "{{ volet_1 != '' }}"
              then:
                - service: cover.open_cover
                  target:
                    entity_id: "{{ volet_1 }}"
                - delay:
                    seconds: "{{ duree_volet_1 | int }}"
                - service: cover.close_cover
                  target:
                    entity_id: "{{ volet_1 }}"
                - delay:
                    seconds: "{{ (duree_volet_1 | float * ratio | float) | int }}"
                - service: cover.stop_cover
                  target:
                    entity_id: "{{ volet_1 }}"

            - if:
                - condition: template
                  value_template: "{{ volet_2 != '' }}"
              then:
                - service: cover.open_cover
                  target:
                    entity_id: "{{ volet_2 }}"
                - delay:
                    seconds: "{{ duree_volet_2 | int }}"
                - service: cover.close_cover
                  target:
                    entity_id: "{{ volet_2 }}"
                - delay:
                    seconds: "{{ (duree_volet_2 | float * ratio | float) | int }}"
                - service: cover.stop_cover
                  target:
                    entity_id: "{{ volet_2 }}"

            - if:
                - condition: template
                  value_template: "{{ volet_3 != '' }}"
              then:
                - service: cover.open_cover
                  target:
                    entity_id: "{{ volet_3 }}"
                - delay:
                    seconds: "{{ duree_volet_3 | int }}"
                - service: cover.close_cover
                  target:
                    entity_id: "{{ volet_3 }}"
                - delay:
                    seconds: "{{ (duree_volet_3 | float * ratio | float) | int }}"
                - service: cover.stop_cover
                  target:
                    entity_id: "{{ volet_3 }}"

            - if:
                - condition: template
                  value_template: "{{ volet_4 != '' }}"
              then:
                - service: cover.open_cover
                  target:
                    entity_id: "{{ volet_4 }}"
                - delay:
                    seconds: "{{ duree_volet_4 | int }}"
                - service: cover.close_cover
                  target:
                    entity_id: "{{ volet_4 }}"
                - delay:
                    seconds: "{{ (duree_volet_4 | float * ratio | float) | int }}"
                - service: cover.stop_cover
                  target:
                    entity_id: "{{ volet_4 }}"

      - conditions: "{{ palier == '0' }}"
        sequence: []

mode: single
max_exceeded: silent
